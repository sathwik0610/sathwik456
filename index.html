<!DOCTYPE html><html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Attendance Tracker</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>

body{
font-family:Arial;
background:#050b17;
color:white;
margin:0;
}

header{
text-align:center;
padding:15px;
font-size:22px;
background:#0c1b36;
}

.container{
padding:15px;
padding-bottom:80px;
}

.card{
background:#0e1f3d;
border-radius:14px;
padding:15px;
margin-bottom:15px;
}

.period{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
padding:12px;
background:#142a52;
border-radius:10px;
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.present{
background:#16a34a;
color:white;
}

.absent{
background:#dc2626;
color:white;
}

.selectedP{
background:#22c55e !important;
}

.selectedA{
background:#ef4444 !important;
}

.nav{
position:fixed;
bottom:0;
width:100%;
background:#0c1b36;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.nav div{
cursor:pointer;
}

canvas{
background:white;
border-radius:10px;
}

</style><script>

let overallAttended=182;
let overallConducted=257;

let weekly={
Mon:0,
Tue:0,
Wed:0,
Thu:0,
Fri:0,
Sat:0
};

const timetable={
Monday:["WT","BT","LAB","LAB","DAA"],
Tuesday:["CAALP","WT","VAC","VAC","LAB","LAB"],
Wednesday:["OS","WT","LAB","LAB","DT","DT"],
Thursday:["OS","DAA","CAALP","BT","English","English"],
Friday:["WT","OS","DAA","CAALP"],
Saturday:["WT","OS","CAALP","DAA"]
};

function showSection(id){

document.querySelectorAll(".section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";

}

function loadDay(){

let date=document.getElementById("datePicker").value;

let day=new Date(date).toLocaleString("en-US",{weekday:"long"});

let subjects=timetable[day];

let box=document.getElementById("todayClasses");

box.innerHTML="";

if(!subjects) return;

subjects.forEach(sub=>{

let div=document.createElement("div");

div.className="period";

div.innerHTML=
"<span>"+sub+"</span>"+
"<div>"+
"<button class='present' onclick=\"mark(this,'"+day+"','P')\">P</button>"+
"<button class='absent' onclick=\"mark(this,'"+day+"','A')\">A</button>"+
"</div>";

box.appendChild(div);

});

}

function mark(btn,day,status){

let parent=btn.parentElement;

parent.querySelectorAll("button").forEach(b=>{
b.classList.remove("selectedP");
b.classList.remove("selectedA");
});

if(status==="P"){
btn.classList.add("selectedP");
overallAttended++;
}else{
btn.classList.add("selectedA");
}

overallConducted++;

let key=day.substring(0,3);

weekly[key]++;

updateGraph();

}

let chart;

function createGraph(){

let ctx=document.getElementById("weeklyChart");

chart=new Chart(ctx,{

type:"bar",

data:{
labels:["Mon","Tue","Wed","Thu","Fri","Sat"],
datasets:[{
label:"Classes Marked",
data:Object.values(weekly),
backgroundColor:"#22c55e"
}]
},

options:{
scales:{
y:{
beginAtZero:true
}
}
}

});

}

function updateGraph(){

chart.data.datasets[0].data=Object.values(weekly);
chart.update();

}

function start(){

showSection("mark");

createGraph();

}

</script></head><body onload="start()"><header>Attendance Tracker</header><div id="mark" class="section container"><div class="card"><h3>Select Date</h3><input type="date" id="datePicker" onchange="loadDay()"><div id="todayClasses"></div></div></div><div id="graphSection" class="section container"><div class="card"><h3>Weekly Attendance Graph</h3><canvas id="weeklyChart"></canvas>

</div></div><div class="nav"><div onclick="showSection('mark')">✅ Mark</div>
<div onclick="showSection('graphSection')">📊 Graph</div></div></body>
</html>
