<!DOCTYPE html><html>
<head>
<title>Sathwik Attendance Portal</title><style>
body{
font-family:Arial;
background:#0f172a;
color:white;
margin:0;
text-align:center;
}

header{
background:#2563eb;
padding:20px;
font-size:28px;
font-weight:bold;
}

.container{
width:90%;
margin:auto;
margin-top:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:12px;
margin-bottom:20px;
}

.percent{
font-size:36px;
color:#22c55e;
margin-top:10px;
}

.progress{
width:100%;
height:20px;
background:#334155;
border-radius:10px;
margin-top:10px;
}

.bar{
height:20px;
background:#22c55e;
border-radius:10px;
}

button{
padding:10px 15px;
margin:5px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.present{
background:#22c55e;
}

.absent{
background:#ef4444;
color:white;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #334155;
padding:8px;
}

th{
background:#2563eb;
}

</style><script>

let attended=182;
let conducted=257;

function update(){

let percent=(attended/conducted)*100;

document.getElementById("attended").innerHTML=attended;
document.getElementById("conducted").innerHTML=conducted;

document.getElementById("percent").innerHTML=percent.toFixed(2)+"%";

document.getElementById("bar").style.width=percent+"%";

let need=Math.ceil((0.75*conducted)-attended);

if(percent>=75){
document.getElementById("msg").innerHTML="Safe Attendance 😎";
}else{
document.getElementById("msg").innerHTML="Attend "+need+" more classes to reach 75%";
}

}

function present(){
attended++;
conducted++;
update();
}

function absent(){
conducted++;
update();
}

</script></head><body onload="update()"><header>Attendance Portal</header><div class="container"><div class="card"><h2>Overall Attendance</h2><p>Attended Classes : <span id="attended"></span></p>
<p>Conducted Classes : <span id="conducted"></span></p><div class="percent" id="percent"></div><div class="progress">
<div class="bar" id="bar"></div>
</div><p id="msg"></p><button class="present" onclick="present()">Present</button>
<button class="absent" onclick="absent()">Absent</button>

</div><div class="card"><h2>Weekly Timetable</h2><table><tr>
<th>Day</th>
<th>Subjects</th>
</tr><tr>
<td>Monday</td>
<td>WT, BT, LAB (2), DAA</td>
</tr><tr>
<td>Tuesday</td>
<td>CAALP, WT, VAC, LAB (2)</td>
</tr><tr>
<td>Wednesday</td>
<td>OS, WT, LAB, DT (2)</td>
</tr><tr>
<td>Thursday</td>
<td>OS, DAA, CAALP, BT, English (2)</td>
</tr><tr>
<td>Friday</td>
<td>WT, OS, DAA, CAALP</td>
</tr><tr>
<td>Saturday</td>
<td>WT, OS, CAALP, DAA</td>
</tr></table></div></div></body>
</html>
