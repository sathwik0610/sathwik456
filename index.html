<!DOCTYPE html><html>
<head><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sathwik Attendance Portal</title><script src="https://cdn.jsdelivr.net/npm/chart.js"></script><style>

body{
font-family:Arial;
background:#050b17;
color:white;
margin:0;
}

header{
text-align:center;
padding:15px;
font-size:22px;
background:#0c1b36;
}

.section{
display:none;
padding:15px;
padding-bottom:90px;
}

.card{
background:#0e1f3d;
border-radius:14px;
padding:15px;
margin-bottom:15px;
}

.period{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
padding:12px;
background:#142a52;
border-radius:10px;
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
font-weight:bold;
cursor:pointer;
}

.present{
background:#16a34a;
color:white;
}

.absent{
background:#dc2626;
color:white;
}

.selectedP{
background:#22c55e !important;
}

.selectedA{
background:#ef4444 !important;
}

.progress{
width:100%;
height:10px;
background:#1e293b;
border-radius:10px;
margin-top:5px;
}

.bar{
height:10px;
background:#22c55e;
border-radius:10px;
}

.nav{
position:fixed;
bottom:0;
width:100%;
background:#0c1b36;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.nav div{
cursor:pointer;
}

canvas{
background:white;
border-radius:10px;
}

</style><script>

let attended=182;
let conducted=257;

const timetable={
Monday:["WT","BT","LAB","LAB","DAA"],
Tuesday:["CAALP","WT","VAC","VAC","LAB","LAB"],
Wednesday:["OS","WT","LAB","LAB","DT","DT"],
Thursday:["OS","DAA","CAALP","BT","English","English"],
Friday:["WT","OS","DAA","CAALP"],
Saturday:["WT","OS","CAALP","DAA"]
};

function showSection(id){
document.querySelectorAll(".section").forEach(s=>s.style.display="none");
document.getElementById(id).style.display="block";
}

function updateOverall(){

let percent=(attended/conducted)*100;

document.getElementById("attended").innerText=attended;
document.getElementById("conducted").innerText=conducted;
document.getElementById("percent").innerText=percent.toFixed(2)+"%";

let bunk=Math.floor((attended/0.75)-conducted);

if(bunk>0){
document.getElementById("bunk").innerText="You can bunk "+bunk+" classes";
}else{
let need=Math.ceil((0.75*conducted)-attended);
document.getElementById("bunk").innerText="Attend "+need+" more classes";
}

}

function loadToday(){

let today=new Date().toLocaleString("en-US",{weekday:"long"});

document.getElementById("today").innerText=today;

let subjects=timetable[today];

let box=document.getElementById("todayClasses");

box.innerHTML="";

subjects.forEach(sub=>{

let div=document.createElement("div");

div.className="period";

div.innerHTML=
"<span>"+sub+"</span>"+
"<div>"+
"<button class='present' onclick=\"mark(this,'P')\">P</button>"+
"<button class='absent' onclick=\"mark(this,'A')\">A</button>"+
"</div>";

box.appendChild(div);

});

}

function mark(btn,status){

let parent=btn.parentElement;

parent.querySelectorAll("button").forEach(b=>{
b.classList.remove("selectedP");
b.classList.remove("selectedA");
});

conducted++;

if(status==="P"){
attended++;
btn.classList.add("selectedP");
}else{
btn.classList.add("selectedA");
}

updateOverall();

}

function start(){

updateOverall();
loadToday();
showSection("home");

}

</script></head><body onload="start()"><header>Attendance Portal</header><div id="home" class="section"><div class="card"><h3>Overall Attendance</h3><p>Attended: <span id="attended"></span></p>
<p>Conducted: <span id="conducted"></span></p><h2 id="percent"></h2><p id="bunk"></p></div></div><div id="mark" class="section"><div class="card"><h3>Today's Classes (<span id="today"></span>)</h3><div id="todayClasses"></div></div></div><div class="nav"><div onclick="showSection('home')">🏠 Home</div>
<div onclick="showSection('mark')">✅ Mark</div></div></body>
</html>
