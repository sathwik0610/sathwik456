<!DOCTYPE html><html>
<head><meta name="viewport" content="width=device-width, initial-scale=1">
<title>Attendance Tracker</title><style>

body{
font-family:Arial;
background:#050b17;
color:white;
margin:0;
}

header{
text-align:center;
padding:15px;
font-size:22px;
background:#0c1b36;
}

.section{
display:none;
padding:15px;
padding-bottom:90px;
}

.card{
background:#0e1f3d;
border-radius:14px;
padding:15px;
margin-bottom:15px;
box-shadow:0 0 15px #0f4cff33;
}

.period{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:10px;
padding:12px;
background:#142a52;
border-radius:10px;
}

button{
padding:6px 12px;
border:none;
border-radius:6px;
font-weight:bold;
}

.present{
background:#16a34a;
color:white;
}

.absent{
background:#dc2626;
color:white;
}

.progress{
width:100%;
height:18px;
background:#1e293b;
border-radius:10px;
margin-top:10px;
}

.bar{
height:18px;
background:#22c55e;
border-radius:10px;
}

.historyCard{
background:#142a52;
padding:10px;
margin-top:10px;
border-radius:10px;
}

.tag{
background:#22c55e;
padding:4px 8px;
border-radius:6px;
margin:3px;
display:inline-block;
}

.nav{
position:fixed;
bottom:0;
width:100%;
background:#0c1b36;
display:flex;
justify-content:space-around;
padding:10px 0;
}

.nav div{
cursor:pointer;
}

</style><script>

let attended=182;
let conducted=257;

let history=JSON.parse(localStorage.getItem("attendanceHistory"))||[];

const timetable={
Monday:["WT","BT","LAB","LAB","DAA"],
Tuesday:["CAALP","WT","VAC","VAC","LAB","LAB"],
Wednesday:["OS","WT","LAB","LAB","DT","DT"],
Thursday:["OS","DAA","CAALP","BT","English","English"],
Friday:["WT","OS","DAA","CAALP"],
Saturday:["WT","OS","CAALP","DAA"]
};

function update(){

let percent=(attended/conducted)*100;

document.getElementById("percent").innerText=percent.toFixed(2)+"%";

document.getElementById("attended").innerText=attended;
document.getElementById("conducted").innerText=conducted;

document.getElementById("bar").style.width=percent+"%";

}

function mark(subject,status){

conducted++;

if(status==="P"){
attended++;
}

let today=new Date().toISOString().split("T")[0];

let record=history.find(r=>r.date===today);

if(!record){

record={date:today,subjects:[]};

history.push(record);

}

record.subjects.push(subject+" "+status);

localStorage.setItem("attendanceHistory",JSON.stringify(history));

update();

renderHistory();

}

function renderHistory(){

let box=document.getElementById("historyBox");

box.innerHTML="";

history.slice().reverse().forEach(r=>{

let div=document.createElement("div");

div.className="historyCard";

div.innerHTML=
"<b>"+r.date+"</b><br>"+
r.subjects.map(s=>"<span class='tag'>"+s+"</span>").join(" ");

box.appendChild(div);

});

}

function showSection(id){

document.querySelectorAll(".section").forEach(s=>s.style.display="none");

document.getElementById(id).style.display="block";

}

function loadDay(){

let date=document.getElementById("datePicker").value;

let day=new Date(date).toLocaleString("en-US",{weekday:"long"});

let subjects=timetable[day];

let container=document.getElementById("todayClasses");

container.innerHTML="";

if(subjects){

subjects.forEach(sub=>{

let div=document.createElement("div");

div.className="period";

div.innerHTML=
"<span>"+sub+"</span>"+
"<div>"+
"<button class='present' onclick=\"mark('"+sub+"','P')\">P</button>"+
"<button class='absent' onclick=\"mark('"+sub+"','A')\">A</button>"+
"</div>";

container.appendChild(div);

});

}

}

function start(){

update();
renderHistory();
showSection("home");

}

</script></head><body onload="start()"><header>Attendance Tracker</header><div id="home" class="section"><div class="card"><h3>Overall Attendance</h3><p>Attended: <span id="attended"></span></p>
<p>Conducted: <span id="conducted"></span></p><h2 id="percent"></h2><div class="progress">
<div id="bar" class="bar"></div>
</div></div></div><div id="markPage" class="section"><div class="card"><h3>Mark Attendance</h3><input type="date" id="datePicker" onchange="loadDay()"><div id="todayClasses"></div></div></div><div id="historyPage" class="section"><div class="card"><h3>Attendance History</h3><div id="historyBox"></div></div></div><div class="nav"><div onclick="showSection('home')">🏠 Home</div>
<div onclick="showSection('markPage')">✅ Mark</div>
<div onclick="showSection('historyPage')">📜 History</div></div></body>
</html>
